default:
  image: quay.io/ascend/cann:9.0.0-910b-ubuntu22.04-py3.11
  tags: [cpu]

stages:
   - linter
   - baselines
   - build
   - tests
   - test_all

# Define the workflow rules manually to make sure only a single pipeline
# is created for each MR update. Without that, GitLab creates one pipeline
# for branch update and one for MR update.
workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_DRAFT'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
    - when: never

shell_check:
  image: koalaman/shellcheck-alpine:stable
  stage: linter
  dependencies: []
  before_script:
    - shellcheck --version
  script:
    - find . -type f -name '*.sh' -print0 | xargs -0 shellcheck -x

black:
  stage: linter
  image: python:3.9
  script:
    - pip3 install -U pip
    - pip3 install black==25.1.0 # The version here should be the same as in .pre-commit-config.yaml
    - black --check .

cmake_linter:
  stage: linter
  image: python:3.9
  script:
    - pip3 install -U pip cmakelang
    - cmake-lint CMakeLists.txt

prospector:
  stage: linter
  image: python:3.9
  script:
    - pip install prospector==1.14.0
    - prospector

clang_linter:
  stage: linter
  dependencies: []
  before_script:
    - export DEBIAN_FRONTEND=noninteractive
    - apt-get update && apt-get install -y clang-format git-core
  script:
    - linter_errors=$(find src/ -iname '*.h' -o -iname '*.cpp' | xargs clang-format -n -style=file 2>&1 || true)
    - echo "$linter_errors"
    - if [ ! -z "$linter_errors" ]; then echo "Detected formatting issues; please fix"; exit 1; else echo "Formatting is correct"; exit 0; fi


clang_tidy:
  stage: linter
  dependencies: []
  needs: []
  script:
    - make clang_tidy

secret_detection:
  stage: linter
  dependencies: []
  before_script: []
  image:
    name: zricethezav/gitleaks:v8.18.2
    entrypoint: [""]
  script:
    - gitleaks detect -v --source .

pages:
  image: zouzias/doxygen:latest
  stage: linter
  dependencies: []
  before_script: []
  script:
    - doxygen doxygen/Doxyfile
    - mv doxygen/documentation/html/ public/
  artifacts:
    expire_in: 1 week
    paths:
      - public

build_spmv_eigen:
  stage: baselines
  dependencies: []
  before_script:
    - export DEBIAN_FRONTEND=noninteractive
    - apt-get update && apt-get install -y libeigen3-dev git-core
  script:
    - cd scripts/baselines/eigen-spmv-cpu
    - export GIT_SSL_NO_VERIFY=1 && make compile

build:
  tags:
    - docker_npu
  stage: build
  before_script:
    - echo "Override script. Do not mutate pip config."
  script:
    - make setup_ci
    - make build
  artifacts:
    expire_in: 2 hours
    paths:
      - tcuscan_ops.*.so
      - build/


