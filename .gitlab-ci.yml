# Uncomment to run all tests in a single run
unit_test:
  tags:
    - docker_npu
  stage: test_all
  dependencies: []
  before_script:
    - echo "Override script. Do not mutate pip config."
  script:
    - make setup_ci
    - source /usr/local/Ascend/ascend-toolkit/set_env.sh && make build test
  rules:
    - if: '$CI_RUN_LONG_TESTS == "1"'
    - when: manual
      allow_failure: true
